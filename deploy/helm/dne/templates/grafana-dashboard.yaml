{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dne.fullname" . }}-dashboard
  namespace: {{ include "dne.dashboardNamespace" . }}
  labels:
    grafana_dashboard: "1"
    {{- include "dne.labels" . | nindent 4 }}
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  dne.json: |
    {{- .Files.Get "files/dne-dashboard.json" | nindent 4 }}
{{- end }}
